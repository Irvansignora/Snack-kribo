<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#E91E8C"/>
  <link rel="icon" href="/images/logo-kribo.png" type="image/png"/>
  <title>Masuk - Snack Kribo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/landing.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #E91E8C;
      --pink-dark: #C2166F;
      --pink-light: #FCE4F0;
      --pink-glow: rgba(233, 30, 140, 0.18);
      --gold: #F59E0B;
      --bg: #FDF6F9;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text2: #5A5A72;
      --text3: #9898B0;
      --border: #F0D6E8;
      --input-bg: #FBF5F8;
      --font: 'Nunito', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background: var(--bg);
      font-family: var(--font);
      position: relative;
      overflow: hidden;
    }

    /* Decorative blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(233,30,140,0.12), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(245,158,11,0.10), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 28px;
      padding: 36px 32px 32px;
      box-shadow: 0 8px 48px rgba(233,30,140,0.10), 0 2px 12px rgba(0,0,0,0.06);
    }

    /* Logo */
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo-img {
      width: 76px; height: 76px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 12px;
      border: 3px solid var(--pink-light);
      box-shadow: 0 4px 20px var(--pink-glow);
    }
    .auth-logo-emoji {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 10px;
      line-height: 1;
    }
    .auth-logo h1 {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .auth-logo h1 span { color: var(--pink); }
    .auth-logo p {
      font-size: 0.82rem;
      color: var(--text3);
      margin-top: 3px;
      font-weight: 600;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      gap: 6px;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 5px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 11px;
      text-align: center;
      border-radius: 12px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-family: var(--font);
      font-weight: 800;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.25s;
    }
    .auth-tab.active {
      background: var(--pink);
      color: #fff;
      box-shadow: 0 4px 14px var(--pink-glow);
    }

    /* Form */
    .auth-form { }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text2);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .form-input {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px var(--pink-glow);
      background: #fff;
    }
    .form-input::placeholder { color: var(--text3); font-weight: 500; }

    /* Affiliate toggle */
    .affiliate-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--input-bg);
      border-radius: 14px;
      margin-bottom: 14px;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: border-color 0.25s, background 0.25s;
    }
    .affiliate-toggle.active {
      border-color: var(--gold);
      background: #FFFBF0;
    }
    .aff-check {
      width: 22px; height: 22px;
      border-radius: 7px;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 0.78rem; font-weight: 900;
      transition: all 0.25s;
      color: transparent;
    }
    .affiliate-toggle.active .aff-check {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
    }
    .aff-text strong {
      font-size: 0.87rem;
      display: block;
      margin-bottom: 2px;
      color: var(--text);
    }
    .aff-text span { font-size: 0.74rem; color: var(--text3); }

    /* Button */
    .btn-auth {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: #fff;
      font-family: var(--font);
      font-weight: 800;
      font-size: 0.98rem;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 24px var(--pink-glow);
      letter-spacing: 0.2px;
    }
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(233,30,140,0.30);
    }
    .btn-auth:active { transform: translateY(0); }
    .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Alerts */
    .auth-error {
      background: #FEF2F2;
      border: 1.5px solid #FECACA;
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 14px;
      font-size: 0.84rem;
      color: #B91C1C;
      font-weight: 600;
      display: none;
    }
    .auth-success {
      background: #F0FDF4;
      border: 1.5px solid #BBF7D0;
      border-radius: 12px;
      padding: 11px 14px;
      margin-bottom: 14px;
      font-size: 0.84rem;
      color: #15803D;
      font-weight: 600;
      display: none;
    }

    /* Back */
    .back-home {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: var(--text3);
      font-size: 0.84rem;
      font-weight: 700;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-home:hover { color: var(--pink); }

    /* Divider / footer branding */
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1.5px solid var(--border);
    }
    .auth-footer span {
      font-size: 0.76rem;
      color: var(--text3);
      font-weight: 600;
    }
    .auth-footer strong { color: var(--pink); }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">

    <div class="auth-logo">
      <img class="auth-logo-img" src="/images/logo-kribo.png" alt="Kribo"
        onerror="this.outerHTML='<span class=\'auth-logo-emoji\'>🍌</span>'"/>
      <h1>SNACK <span>KRIBO</span></h1>
      <p>Kripik Istimewa Bro!</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab" onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>

    <!-- LOGIN -->
    <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">📧 Email</label>
        <input class="form-input" id="loginEmail" type="email" placeholder="email@contoh.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Password</label>
        <input class="form-input" id="loginPass" type="password" placeholder="Masukkan password" required/>
      </div>
      <button class="btn-auth" type="submit" id="loginBtn">Masuk →</button>
    </form>

    <!-- REGISTER -->
    <form class="auth-form" id="registerForm" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="form-label">👤 Nama Lengkap</label>
        <input class="form-input" id="regName" type="text" placeholder="Nama lengkap kamu" required/>
      </div>
      <div class="form-group">
        <label class="form-label">📧 Email</label>
        <input class="form-input" id="regEmail" type="email" placeholder="email@contoh.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">🔒 Password</label>
        <input class="form-input" id="regPass" type="password" placeholder="Min. 6 karakter" required minlength="6"/>
      </div>
      <div class="affiliate-toggle" id="affToggle" onclick="toggleAffiliate()">
        <div class="aff-check" id="affCheck"></div>
        <div class="aff-text">
          <strong>💰 Daftar sebagai Affiliate</strong>
          <span>Dapatkan komisi dari setiap penjualan</span>
        </div>
      </div>
      <button class="btn-auth" type="submit" id="regBtn">Daftar Sekarang →</button>
    </form>

    <div class="auth-footer">
      <span>Dengan mendaftar, kamu setuju dengan <strong>Syarat & Ketentuan</strong> kami</span>
    </div>

    <a href="/" class="back-home">← Kembali ke Beranda</a>
  </div>
</div>

<script type="module">
import '/js/data.js';

let isAffiliate = false;

window.switchTab = function(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.auth-tab:${tab==='login'?'first':'last'}-child`).classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  hideMessages();
};

window.toggleAffiliate = function() {
  isAffiliate = !isAffiliate;
  document.getElementById('affToggle').classList.toggle('active', isAffiliate);
  document.getElementById('affCheck').textContent = isAffiliate ? '✓' : '';
};

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('authSuccess').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('authError').style.display = 'none';
}
function hideMessages() {
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}

window.handleLogin = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '⏳ Memproses...';
  hideMessages();
  try {
    await DB.init();
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const { user, userData } = await DB.login(email, pass);
    showSuccess('✅ Login berhasil! Mengalihkan...');
    setTimeout(() => {
      if (userData?.isAffiliate && userData?.affiliateApproved) window.location.href = '/affiliate.html';
      else window.location.href = '/shop.html';
    }, 1000);
  } catch(err) {
    const msg = err.code === 'auth/invalid-credential' ? 'Email atau password salah!'
      : err.code === 'auth/user-not-found' ? 'Akun tidak ditemukan!'
      : err.code === 'auth/too-many-requests' ? 'Terlalu banyak percobaan, coba lagi nanti.'
      : 'Gagal masuk: ' + err.message;
    showError('❌ ' + msg);
  } finally {
    btn.disabled = false; btn.textContent = 'Masuk →';
  }
};

window.handleRegister = async function(e) {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = '⏳ Mendaftar...';
  hideMessages();
  try {
    await DB.init();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    await DB.register(email, pass, name, isAffiliate);
    if (isAffiliate) {
      showSuccess('✅ Pendaftaran affiliate berhasil! Menunggu persetujuan admin. Mengalihkan...');
      setTimeout(() => { window.location.href = '/affiliate.html'; }, 2000);
    } else {
      showSuccess('✅ Registrasi berhasil! Mengalihkan ke toko...');
      setTimeout(() => { window.location.href = '/shop.html'; }, 1500);
    }
  } catch(err) {
    const msg = err.code === 'auth/email-already-in-use' ? 'Email sudah terdaftar!'
      : err.code === 'auth/weak-password' ? 'Password terlalu lemah (min. 6 karakter)!'
      : 'Gagal mendaftar: ' + err.message;
    showError('❌ ' + msg);
  } finally {
    btn.disabled = false; btn.textContent = 'Daftar Sekarang →';
  }
};

const params = new URLSearchParams(window.location.search);
if (params.get('mode') === 'affiliate') {
  switchTab('register');
  setTimeout(() => { if (!isAffiliate) toggleAffiliate(); }, 100);
}

(async () => {
  try {
    await DB.init();
    const user = DB.getCurrentUser();
    if (user) {
      const userData = await DB.getUserData(user.uid);
      if (userData?.isAffiliate) window.location.href = '/affiliate.html';
      else window.location.href = '/shop.html';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
