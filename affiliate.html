<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#E91E8C"/>
  <link rel="icon" href="/images/logo-kribo.png" type="image/png"/>
  <title>Affiliate Dashboard - Snack Kribo</title>
  <link rel="stylesheet" href="/css/landing.css"/>
  <style>
    /* ── Dark-theme variables (tidak ada di landing.css) ── */
    :root {
      --dark:  #0A0A14;
      --dark2: #0F0F1E;
      --dark3: #131326;
      --dark4: #1A1A2E;
      --white2: rgba(255,255,255,0.85);
      --white3: rgba(255,255,255,0.55);
      --white4: rgba(255,255,255,0.3);
      --glass:  rgba(255,255,255,0.07);
      --glass2: rgba(255,255,255,0.1);
      --gold:   #FFD93D;
      --pink-glow: rgba(233,30,140,0.35);
      --font: 'Poppins', sans-serif;
    }
    body { background:var(--dark); min-height:100vh; color:#fff; }
    .aff-nav {
      position:sticky; top:0; z-index:100; padding:14px 24px;
      background:rgba(10,10,20,0.95); backdrop-filter:blur(20px);
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--glass2);
    }
    .aff-nav-brand { display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.1rem; }
    .aff-nav-brand span { color:var(--pink); }
    .aff-nav-right { display:flex; gap:10px; align-items:center; }
    .aff-user { font-size:0.85rem; color:var(--white2); font-weight:600; }
    .btn-out {
      padding:8px 16px; border-radius:10px; border:1.5px solid var(--glass2);
      background:transparent; color:var(--white3); font-family:var(--font);
      font-weight:700; font-size:0.8rem; cursor:pointer; transition:all 0.3s;
    }
    .btn-out:hover { border-color:var(--pink); color:var(--pink); }
    .aff-content { max-width:1000px; margin:0 auto; padding:24px 20px 60px; }
    .aff-welcome {
      background:linear-gradient(135deg, var(--dark3), var(--dark4));
      border:1px solid var(--glass2); border-radius:20px;
      padding:32px; margin-bottom:24px; position:relative; overflow:hidden;
    }
    .aff-welcome::before {
      content:''; position:absolute; top:-60px; right:-60px; width:200px; height:200px;
      background:radial-gradient(circle, var(--pink-glow), transparent 70%);
      border-radius:50%; filter:blur(60px);
    }
    .aff-welcome h1 { font-size:1.6rem; font-weight:900; margin-bottom:8px; position:relative; z-index:1; }
    .aff-welcome p { color:var(--white3); font-size:0.92rem; position:relative; z-index:1; }
    .aff-pending {
      background:rgba(255,217,61,0.1); border:1px solid rgba(255,217,61,0.3);
      border-radius:16px; padding:24px; text-align:center; margin-bottom:24px;
    }
    .aff-pending h2 { font-size:1.2rem; color:var(--gold); margin-bottom:8px; }
    .aff-pending p { color:var(--white3); font-size:0.88rem; }
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-box {
      background:var(--dark3); border:1px solid var(--glass2); border-radius:16px;
      padding:24px 20px; text-align:center; transition:all 0.3s;
    }
    .stat-box:hover { border-color:var(--pink); transform:translateY(-2px); }
    .stat-icon { font-size:1.8rem; margin-bottom:8px; }
    .stat-value { font-size:1.8rem; font-weight:900; margin-bottom:4px; }
    .stat-value.pink { color:var(--pink); }
    .stat-value.gold { color:var(--gold); }
    .stat-value.green { color:var(--green); }
    .stat-label { font-size:0.78rem; color:var(--white3); font-weight:600; }
    .aff-card {
      background:var(--dark3); border:1px solid var(--glass2); border-radius:20px;
      padding:28px; margin-bottom:20px;
    }
    .aff-card h2 { font-size:1.1rem; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .ref-link-box {
      display:flex; gap:10px; align-items:center; background:var(--dark4);
      border-radius:14px; padding:14px 18px; margin-bottom:16px;
    }
    .ref-link-box input {
      flex:1; background:transparent; border:none; color:var(--white);
      font-family:var(--font); font-size:0.88rem; font-weight:600; outline:none;
    }
    .btn-copy {
      padding:10px 20px; border-radius:12px; border:none;
      background:var(--pink); color:var(--white); font-family:var(--font);
      font-weight:700; font-size:0.82rem; cursor:pointer; transition:all 0.3s; white-space:nowrap;
    }
    .btn-copy:hover { background:var(--pink-light); }
    .share-btns { display:flex; gap:10px; flex-wrap:wrap; }
    .btn-share {
      padding:10px 20px; border-radius:12px; border:none;
      font-family:var(--font); font-weight:700; font-size:0.82rem;
      cursor:pointer; transition:all 0.3s; display:flex; align-items:center; gap:6px;
    }
    .btn-wa-share { background:#25D366; color:#fff; }
    .btn-tg-share { background:#0088CC; color:#fff; }
    .btn-tw-share { background:#1DA1F2; color:#fff; }
    .btn-share:hover { transform:translateY(-2px); }
    .btn-withdraw {
      display:flex; align-items:center; gap:10px; width:100%;
      padding:16px 24px; border-radius:16px; border:2px solid var(--gold);
      background:rgba(255,217,61,0.08); color:var(--gold);
      font-family:var(--font); font-weight:800; font-size:0.95rem;
      cursor:pointer; transition:all 0.3s; margin-top:16px; justify-content:center;
    }
    .btn-withdraw:hover { background:rgba(255,217,61,0.18); transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,217,61,0.15); }
    .btn-withdraw:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
    .withdraw-card {
      background:linear-gradient(135deg,rgba(255,217,61,0.08),rgba(255,217,61,0.03));
      border:1.5px solid rgba(255,217,61,0.3); border-radius:20px; padding:24px; margin-bottom:20px;
    }
    .withdraw-card h2 { font-size:1.1rem; font-weight:800; margin-bottom:8px; display:flex; align-items:center; gap:8px; color:var(--gold); }
    .withdraw-amount { font-size:2.2rem; font-weight:900; color:var(--gold); margin:12px 0 4px; }
    .withdraw-min-note { font-size:0.78rem; color:var(--white3); }
    /* ── Withdraw Modal ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
      z-index:999; align-items:center; justify-content:center; padding:20px;
    }
    .modal-overlay.active { display:flex; }
    .modal-box {
      background:#1a1a2e; border:1.5px solid rgba(255,217,61,0.3);
      border-radius:24px; padding:28px 24px; width:100%; max-width:440px;
      animation:modalIn 0.25s ease;
    }
    @keyframes modalIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-box h3 { font-size:1.1rem; font-weight:800; color:var(--gold); margin-bottom:4px; }
    .modal-box .modal-sub { font-size:0.8rem; color:var(--white3); margin-bottom:20px; }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:0.78rem; font-weight:700; color:var(--white3); margin-bottom:6px; }
    .modal-field select, .modal-field input {
      width:100%; padding:12px 14px; border-radius:12px;
      background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.12);
      color:#fff; font-family:var(--font); font-size:0.9rem; box-sizing:border-box;
    }
    .modal-field select:focus, .modal-field input:focus {
      outline:none; border-color:var(--gold);
    }
    .modal-field select option { background:#1a1a2e; color:#fff; }
    .modal-actions { display:flex; gap:10px; margin-top:20px; }
    .modal-btn-cancel {
      flex:1; padding:14px; border-radius:12px; border:1.5px solid rgba(255,255,255,0.15);
      background:transparent; color:var(--white3); font-family:var(--font);
      font-weight:700; cursor:pointer; font-size:0.9rem;
    }
    .modal-btn-submit {
      flex:2; padding:14px; border-radius:12px; border:none;
      background:var(--gold); color:#1a1a00; font-family:var(--font);
      font-weight:800; cursor:pointer; font-size:0.9rem;
    }
    .modal-btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
    .orders-table { width:100%; border-collapse:collapse; }
    .orders-table th {
      font-size:0.72rem; font-weight:800; text-transform:uppercase;
      letter-spacing:0.5px; color:var(--white3); padding:10px 12px;
      border-bottom:1px solid var(--glass2); text-align:left;
    }
    .orders-table td {
      padding:12px; font-size:0.85rem; border-bottom:1px solid var(--glass2);
      color:var(--white2);
    }
    .orders-table tr:hover td { background:rgba(255,255,255,0.02); }
    .commission-badge {
      display:inline-block; padding:4px 12px; border-radius:20px;
      font-size:0.75rem; font-weight:800;
      background:rgba(34,197,94,0.15); color:var(--green);
    }
    .empty-orders { text-align:center; padding:40px; color:var(--white3); }
    .empty-orders .emoji { font-size:3rem; margin-bottom:12px; }
    @media (max-width:768px) {
      .stats-row { grid-template-columns:1fr 1fr; }
      .aff-content { padding:16px 14px 60px; }
      .stat-value { font-size:1.3rem; }
      .aff-nav { padding:12px 16px; }
      .aff-nav-right { gap:6px; }
      .aff-user { display:none; }
    }
    @media (max-width:480px) {
      .stats-row { grid-template-columns:1fr 1fr; gap:10px; }
      .ref-link-box { flex-direction:column; }
      .share-btns { flex-direction:column; }
      .btn-share { justify-content:center; }
    }
  </style>
</head>
<body>

<nav class="aff-nav">
  <div class="aff-nav-brand">
    <a href="/" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit">
      🍌 SNACK <span>KRIBO</span>
    </a>
  </div>
  <div class="aff-nav-right">
    <span class="aff-user" id="affUserName">Loading...</span>
    <a href="/shop.html" class="btn-out">🛒 Toko</a>
    <button class="btn-out" onclick="handleLogout()">Keluar</button>
  </div>
</nav>

<div class="aff-content" id="affContent">
  <div style="text-align:center;padding:60px;color:var(--white3)">
    <div style="font-size:2rem;margin-bottom:12px">⏳</div>
    <p>Memuat dashboard...</p>
  </div>
</div>

<script type="module">
import '/js/data.js';

let currentUser = null;
let userData = null;

async function initAffiliate() {
  try {
    await DB.init();
    currentUser = DB.getCurrentUser();
    if (!currentUser) { window.location.href = '/login.html'; return; }
    userData = await DB.getUserData(currentUser.uid);
    if (!userData || !userData.isAffiliate) {
      window.location.href = '/shop.html'; return;
    }
    document.getElementById('affUserName').textContent = userData.name || currentUser.email;
    renderDashboard();
  } catch(e) {
    console.error(e);
    document.getElementById('affContent').innerHTML = `<div style="text-align:center;padding:60px;color:#FCA5A5">
      <div style="font-size:2rem;margin-bottom:12px">❌</div><p>Gagal memuat. Cek koneksi internet.</p>
      <a href="/login.html" style="color:var(--pink);margin-top:12px;display:inline-block">← Kembali ke Login</a>
    </div>`;
  }
}

function renderWithdrawEmpty() {
  return '<div class="withdraw-card" style="opacity:0.7"><h2>🏦 Pencairan Komisi</h2><div class="withdraw-amount">Rp 0</div><p class="withdraw-min-note">Belum ada komisi yang bisa dicairkan. Bagikan link referral kamu untuk mulai mengumpulkan komisi!</p></div>';
}

function renderWithdrawCard(pendingPayout, userData, settings) {
  const minPayout = (settings && settings.affiliateMinPayout) || 50000;
  let actionHtml;
  if (userData.payoutRequested) {
    actionHtml = '<p class="withdraw-min-note" style="color:var(--gold)">⏳ Request pencairan sudah dikirim ke admin. Harap tunggu konfirmasi pembayaran.</p>'
      + '<button class="btn-withdraw" disabled>⏳ Menunggu Konfirmasi Admin</button>';
  } else if (pendingPayout < minPayout) {
    const kurang = DB.formatRupiah(minPayout - pendingPayout);
    actionHtml = '<p class="withdraw-min-note">⚠️ Minimum pencairan ' + DB.formatRupiah(minPayout) + '. Kamu butuh <strong style="color:var(--gold)">' + kurang + '</strong> lagi.</p>'
      + '<button class="btn-withdraw" disabled>💸 Tarik Komisi (Belum Mencapai Minimum)</button>';
  } else {
    actionHtml = '<p class="withdraw-min-note" style="color:#4ade80">✅ Sudah bisa dicairkan! Klik tombol di bawah untuk request pencairan.</p>'
      + '<button class="btn-withdraw" onclick="requestWithdraw(' + pendingPayout + ')">💸 Tarik Komisi Sekarang</button>';
  }
  return '<div class="withdraw-card"><h2>🏦 Pencairan Komisi</h2>'
    + '<p style="font-size:0.82rem;color:var(--white3)">Komisi tersedia untuk dicairkan:</p>'
    + '<div class="withdraw-amount">' + DB.formatRupiah(pendingPayout) + '</div>'
    + actionHtml + '</div>';
}

async function renderDashboard() {
  const content = document.getElementById('affContent');
  const settings = await DB.getSettings();
  const commRate = settings.affiliateCommission || 10;

  if (!userData.affiliateApproved) {
    content.innerHTML = `
      <div class="aff-welcome">
        <h1>Halo, ${userData.name}! 👋</h1>
        <p>Selamat datang di Program Affiliate Snack Kribo</p>
      </div>
      <div class="aff-pending">
        <div style="font-size:3rem;margin-bottom:12px">⏳</div>
        <h2>Menunggu Persetujuan Admin</h2>
        <p>Pendaftaran affiliate kamu sedang ditinjau. Kamu akan mendapat akses penuh setelah disetujui oleh admin.</p>
        <p style="margin-top:12px;font-size:0.82rem">Kode Affiliate: <strong style="color:var(--gold)">${userData.affiliateCode}</strong></p>
      </div>`;
    return;
  }

  // Get affiliate orders
  let affOrders = [];
  try { affOrders = await DB.getAffiliateOrders(userData.affiliateCode); } catch(e) {}
  const completedOrders = affOrders.filter(o => o.status !== 'cancel');
  const totalSales = userData.totalSales || 0;
  const totalCommission = userData.totalCommission || 0;
  const pendingPayout = userData.pendingPayout || 0;
  const shopUrl = window.location.origin + '/shop.html?ref=' + userData.affiliateCode;

  content.innerHTML = `
    <div class="aff-welcome">
      <h1>Halo, ${userData.name}! 👋</h1>
      <p>Dashboard Affiliate — Komisi ${commRate}% dari setiap penjualan melalui link referral kamu.</p>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-icon">📦</div>
        <div class="stat-value pink">${completedOrders.length}</div>
        <div class="stat-label">Total Pesanan</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">💰</div>
        <div class="stat-value gold">${DB.formatRupiah(totalSales)}</div>
        <div class="stat-label">Total Penjualan</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">💸</div>
        <div class="stat-value green">${DB.formatRupiah(totalCommission)}</div>
        <div class="stat-label">Total Komisi</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">🏦</div>
        <div class="stat-value gold">${DB.formatRupiah(pendingPayout)}</div>
        <div class="stat-label">Belum Dicairkan</div>
      </div>
    </div>

    <div class="aff-card">
      <h2>🔗 Link Referral Kamu</h2>
      <div class="ref-link-box">
        <input type="text" id="refLinkInput" value="${shopUrl}" readonly/>
        <button class="btn-copy" onclick="copyRefLink()">📋 Salin</button>
      </div>
      <p style="font-size:0.82rem;color:var(--white3);margin-bottom:12px">
        Kode: <strong style="color:var(--gold)">${userData.affiliateCode}</strong> • 
        Komisi: <strong style="color:var(--green)">${commRate}%</strong> per transaksi
      </p>
      <p style="font-size:0.82rem;color:var(--white3);margin-bottom:14px;font-weight:600">📤 Bagikan ke:</p>
      <div class="share-btns">
        <button class="btn-share btn-wa-share" onclick="shareWA()">💬 WhatsApp</button>
        <button class="btn-share btn-tg-share" onclick="shareTG()">📨 Telegram</button>
        <button class="btn-share btn-tw-share" onclick="shareTW()">🐦 Twitter/X</button>
      </div>
    </div>

    ${pendingPayout > 0 ? renderWithdrawCard(pendingPayout, userData, settings) : renderWithdrawEmpty()}

    <div class="aff-card">
      <h2>📦 Riwayat Pesanan Referral</h2>
      ${completedOrders.length ? `
        <div style="overflow-x:auto">
          <table class="orders-table">
            <thead><tr><th>Order ID</th><th>Tanggal</th><th>Total</th><th>Komisi</th><th>Status</th></tr></thead>
            <tbody>
              ${completedOrders.map(o => {
                const comm = Math.floor(o.total * commRate / 100);
                const statusLabel = {pending:'⏳',process:'⚙️',delivery:'🛵',done:'✅',cancel:'❌'};
                return `<tr>
                  <td><strong>${o.id}</strong></td>
                  <td>${DB.formatDate(o.createdAt)}</td>
                  <td>${DB.formatRupiah(o.total)}</td>
                  <td><span class="commission-badge">+${DB.formatRupiah(comm)}</span></td>
                  <td>${statusLabel[o.status]||o.status}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      ` : `
        <div class="empty-orders">
          <div class="emoji">📭</div>
          <p>Belum ada pesanan melalui link referral kamu</p>
          <p style="font-size:0.82rem;margin-top:8px">Bagikan link referral di atas untuk mulai mendapatkan komisi!</p>
        </div>
      `}
    </div>`;
}

let _withdrawAmount = 0;

window.requestWithdraw = function(amount) {
  _withdrawAmount = amount;
  document.getElementById('withdrawAmountLabel').textContent = DB.formatRupiah(amount);
  document.getElementById('payoutMethod').value = '';
  document.getElementById('payoutAccount').value = '';
  document.getElementById('payoutAccountName').value = '';
  document.getElementById('withdrawModal').classList.add('active');
};

window.closeWithdrawModal = function() {
  document.getElementById('withdrawModal').classList.remove('active');
};

window.submitWithdraw = async function() {
  const method = document.getElementById('payoutMethod').value.trim();
  const account = document.getElementById('payoutAccount').value.trim();
  const accountName = document.getElementById('payoutAccountName').value.trim();
  if (!method) { alert('⚠️ Pilih metode pembayaran dulu.'); return; }
  if (!account) { alert('⚠️ Masukkan nomor rekening / nomor HP.'); return; }
  if (!accountName) { alert('⚠️ Masukkan nama pemilik rekening.'); return; }

  const btn = document.getElementById('withdrawSubmitBtn');
  btn.disabled = true; btn.textContent = '⏳ Mengirim...';
  try {
    await DB.updateUserData(currentUser.uid, {
      payoutRequested: true,
      payoutRequestedAt: Date.now(),
      payoutRequestedAmount: _withdrawAmount,
      payoutMethod: method,
      payoutAccount: account,
      payoutAccountName: accountName,
    });
    closeWithdrawModal();
    userData = await DB.getUserData(currentUser.uid);
    renderDashboard();
    alert('✅ Request pencairan berhasil dikirim! Admin akan segera memproses pembayaran ke ' + method + ' atas nama ' + accountName + '.');
  } catch(e) {
    console.error(e);
    alert('❌ Gagal mengirim request. Coba lagi.');
    btn.disabled = false; btn.textContent = 'Kirim Request';
  }
};


window.copyRefLink = function() {
  const input = document.getElementById('refLinkInput');
  input.select();
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = input.nextElementSibling;
    btn.textContent = '✅ Tersalin!';
    setTimeout(() => { btn.textContent = '📋 Salin'; }, 2000);
  });
};

window.shareWA = function() {
  const url = document.getElementById('refLinkInput').value;
  const text = encodeURIComponent(`🍌 Cobain Snack Kribo — Keripik pisang premium yang bikin nagih! Pesan di sini: ${url}`);
  window.open(`https://wa.me/?text=${text}`, '_blank');
};

window.shareTG = function() {
  const url = document.getElementById('refLinkInput').value;
  const text = encodeURIComponent('🍌 Cobain Snack Kribo — Keripik pisang premium yang bikin nagih!');
  window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${text}`, '_blank');
};

window.shareTW = function() {
  const url = document.getElementById('refLinkInput').value;
  const text = encodeURIComponent(`🍌 Cobain Snack Kribo — Keripik pisang premium! ${url}`);
  window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
};

window.handleLogout = async function() {
  try { await DB.logout(); } catch(e) {}
  window.location.href = '/login.html';
};

initAffiliate();
</script>
<!-- Withdraw Modal -->
<div class="modal-overlay" id="withdrawModal">
  <div class="modal-box">
    <h3>💸 Request Pencairan Komisi</h3>
    <p class="modal-sub">Isi data rekening/e-wallet untuk pencairan <strong id="withdrawAmountLabel" style="color:var(--gold)"></strong></p>
    <div class="modal-field">
      <label>Metode Pembayaran</label>
      <select id="payoutMethod">
        <option value="">-- Pilih Metode --</option>
        <option value="Transfer Bank - BCA">🏦 Transfer Bank - BCA</option>
        <option value="Transfer Bank - Mandiri">🏦 Transfer Bank - Mandiri</option>
        <option value="Transfer Bank - BRI">🏦 Transfer Bank - BRI</option>
        <option value="Transfer Bank - BNI">🏦 Transfer Bank - BNI</option>
        <option value="Transfer Bank - BSI">🏦 Transfer Bank - BSI</option>
        <option value="Transfer Bank - Lainnya">🏦 Transfer Bank - Lainnya</option>
        <option value="GoPay">💚 GoPay</option>
        <option value="OVO">💜 OVO</option>
        <option value="DANA">💙 DANA</option>
        <option value="ShopeePay">🧡 ShopeePay</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Nomor Rekening / Nomor HP (e-wallet)</label>
      <input type="text" id="payoutAccount" placeholder="Contoh: 1234567890" inputmode="numeric"/>
    </div>
    <div class="modal-field">
      <label>Nama Pemilik Rekening</label>
      <input type="text" id="payoutAccountName" placeholder="Sesuai nama di rekening/e-wallet"/>
    </div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeWithdrawModal()">Batal</button>
      <button class="modal-btn-submit" id="withdrawSubmitBtn" onclick="submitWithdraw()">Kirim Request</button>
    </div>
  </div>
</div>

</body>
</html>
